name: Build and Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build API
        run: |
          cd api
          npm install

      - name: Build Gateway
        run: |
          cd gateway
          npm install

      - name: Build Frontend
        run: |
          # Assuming frontend is static, no build needed or add if applicable

  deploy-dev:
    needs: build
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Set Azure Subscription
        run: |
          az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get ACR credentials
        run: |
          RESOURCE_GROUP="${{ secrets.AZURE_RESOURCE_GROUP || 'microservices-rg' }}"
          echo "Using resource group: $RESOURCE_GROUP"
          
          # Get ACR name from the deployment or list
          ACR_NAME=$(az acr list --resource-group "$RESOURCE_GROUP" --query '[0].name' -o tsv)
          
          if [ -z "$ACR_NAME" ]; then
            echo "No ACR found in resource group. Trying to get from bicep output..."
            # Try to get it from a previous deployment
            ACR_NAME=$(az deployment group show --resource-group "$RESOURCE_GROUP" --name main 2>/dev/null --query properties.outputs.containerRegistryLoginServer.value -o tsv | cut -d'.' -f1)
          fi
          
          if [ -z "$ACR_NAME" ]; then
            echo "Error: Could not find Azure Container Registry in resource group '$RESOURCE_GROUP'"
            exit 1
          fi
          
          echo "ACR_NAME=$ACR_NAME" >> $GITHUB_ENV
          ACR_LOGIN_SERVER=$(az acr show --name "$ACR_NAME" --query loginServer -o tsv)
          echo "ACR_LOGIN_SERVER=$ACR_LOGIN_SERVER" >> $GITHUB_ENV
          
          az acr credential show --name "$ACR_NAME" --query "passwords[0].value" -o tsv > /tmp/acr_password
          echo "ACR_PASSWORD=$(cat /tmp/acr_password)" >> $GITHUB_ENV
          rm /tmp/acr_password

      - name: Login to ACR
        run: |
          echo "$ACR_PASSWORD" | docker login $ACR_LOGIN_SERVER -u $ACR_NAME --password-stdin

      - name: Build and push API image
        run: |
          docker build --platform linux/amd64 -t $ACR_LOGIN_SERVER/api:v1 ./api
          docker push $ACR_LOGIN_SERVER/api:v1

      - name: Build and push Gateway image
        run: |
          docker build --platform linux/amd64 -t $ACR_LOGIN_SERVER/gateway:v1 ./gateway
          docker push $ACR_LOGIN_SERVER/gateway:v1

      - name: Ensure resource group exists
        run: |
          RESOURCE_GROUP="${{ secrets.AZURE_RESOURCE_GROUP || 'microservices-rg' }}"
          echo "Creating/verifying resource group: $RESOURCE_GROUP"
          az group create --name "$RESOURCE_GROUP" --location eastasia

      - name: Deploy infra using Bicep
        run: |
          RESOURCE_GROUP="${{ secrets.AZURE_RESOURCE_GROUP || 'microservices-rg' }}"
          az deployment group create \
            --resource-group "$RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters @infra/parameters.json