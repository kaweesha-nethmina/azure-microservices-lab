name: Build and Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build API
        run: |
          cd api
          npm install

      - name: Build Gateway
        run: |
          cd gateway
          npm install

      - name: Build Frontend
        run: |
          # Assuming frontend is static, no build needed or add if applicable

  deploy-dev:
    needs: build
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Set Azure Subscription
        run: |
          az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get ACR credentials
        run: |
          ACR_NAME=$(az acr list --resource-group "${{ secrets.AZURE_RESOURCE_GROUP || 'ctse' }}" --query '[0].name' -o tsv)
          echo "ACR_NAME=$ACR_NAME" >> $GITHUB_ENV
          ACR_LOGIN_SERVER=$(az acr show --name $ACR_NAME --query loginServer -o tsv)
          echo "ACR_LOGIN_SERVER=$ACR_LOGIN_SERVER" >> $GITHUB_ENV
          
          az acr credential show --name $ACR_NAME --query "passwords[0].value" -o tsv > /tmp/acr_password
          echo "ACR_PASSWORD=$(cat /tmp/acr_password)" >> $GITHUB_ENV
          rm /tmp/acr_password

      - name: Login to ACR
        run: |
          echo "$ACR_PASSWORD" | docker login $ACR_LOGIN_SERVER -u $ACR_NAME --password-stdin

      - name: Build and push API image
        run: |
          docker build --platform linux/amd64 -t $ACR_LOGIN_SERVER/api:v1 ./api
          docker push $ACR_LOGIN_SERVER/api:v1

      - name: Build and push Gateway image
        run: |
          docker build --platform linux/amd64 -t $ACR_LOGIN_SERVER/gateway:v1 ./gateway
          docker push $ACR_LOGIN_SERVER/gateway:v1

      - name: Ensure resource group exists
        run: |
          az group create --name "${{ secrets.AZURE_RESOURCE_GROUP || 'ctse' }}" --location eastasia

      - name: Deploy infra using Bicep
        run: |
          az deployment group create \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP || 'ctse' }}" \
            --template-file infra/main.bicep \
            --parameters @infra/parameters.json