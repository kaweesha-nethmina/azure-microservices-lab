<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Azure Microservices Lab</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      max-width: 600px;
      width: 100%;
      padding: 40px;
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
      text-align: center;
    }

    .subtitle {
      color: #666;
      text-align: center;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .status-box {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
      border-left: 4px solid #667eea;
    }

    .status-box h3 {
      color: #333;
      margin-bottom: 10px;
    }

    .status {
      display: flex;
      align-items: center;
      margin: 8px 0;
    }

    .status-indicator {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 10px;
    }

    .status-indicator.healthy {
      background: #4CAF50;
    }

    .status-indicator.unhealthy {
      background: #f44336;
    }

    .status-indicator.unknown {
      background: #FFC107;
    }

    .status-text {
      color: #555;
      font-size: 14px;
    }

    .form-section {
      margin-top: 30px;
    }

    .form-section h3 {
      color: #333;
      margin-bottom: 15px;
      border-bottom: 2px solid #667eea;
      padding-bottom: 10px;
    }

    .input-group {
      margin-bottom: 15px;
      display: flex;
      gap: 10px;
    }

    input[type="text"],
    input[type="email"],
    select {
      flex: 1;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .button-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: #667eea;
      color: white;
      flex: 1;
      min-width: 120px;
    }

    .btn-primary:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-success {
      background: #4CAF50;
      color: white;
    }

    .btn-success:hover {
      background: #45a049;
    }

    .btn-danger {
      background: #f44336;
      color: white;
    }

    .btn-danger:hover {
      background: #da190b;
    }

    .btn-secondary {
      background: #999;
      color: white;
    }

    .btn-secondary:hover {
      background: #777;
    }

    .result-box {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 5px;
      margin-top: 20px;
      max-height: 300px;
      overflow-y: auto;
      border: 1px solid #ddd;
    }

    .result-box h4 {
      color: #333;
      margin-bottom: 10px;
    }

    .result-content {
      background: white;
      padding: 10px;
      border-radius: 3px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: #333;
      word-break: break-all;
    }

    .error {
      color: #f44336;
      background: #ffebee;
      padding: 10px;
      border-radius: 5px;
      margin-top: 10px;
      border-left: 4px solid #f44336;
    }

    .success {
      color: #4CAF50;
      background: #e8f5e9;
      padding: 10px;
      border-radius: 5px;
      margin-top: 10px;
      border-left: 4px solid #4CAF50;
    }

    .users-list {
      list-style: none;
      margin-top: 15px;
    }

    .users-list li {
      background: white;
      padding: 12px;
      margin-bottom: 8px;
      border-radius: 5px;
      border-left: 4px solid #667eea;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
    }

    .user-info {
      flex: 1;
    }

    .user-name {
      font-weight: 500;
      color: #333;
    }

    .user-email {
      color: #666;
      font-size: 12px;
    }

    .user-actions {
      display: flex;
      gap: 5px;
    }

    .btn-delete {
      background: #f44336;
      color: white;
      padding: 5px 10px;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
    }

    .btn-delete:hover {
      background: #da190b;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #667eea;
      border-top: 2px solid transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 Azure Microservices Lab</h1>
    <p class="subtitle">A complete microservices application</p>

    <!-- Service Status -->
    <div class="status-box">
      <h3>Service Status</h3>
      <div class="status">
        <div id="gateway-indicator" class="status-indicator unknown"></div>
        <span class="status-text">Gateway: <span id="gateway-status">Checking...</span></span>
      </div>
      <div class="status">
        <div id="api-indicator" class="status-indicator unknown"></div>
        <span class="status-text">API: <span id="api-status">Checking...</span></span>
      </div>
    </div>

    <button class="btn-primary" onclick="checkServices()">🔄 Check Services</button>

    <!-- User Management -->
    <div class="form-section">
      <h3>👥 User Management</h3>
      
      <div class="input-group">
        <input type="text" id="name" placeholder="User Name" />
        <input type="email" id="email" placeholder="Email Address" />
      </div>

      <div class="button-group">
        <button class="btn-success" onclick="createUser()">➕ Add User</button>
        <button class="btn-secondary" onclick="loadUsers()">📋 Load Users</button>
      </div>

      <div id="result-message"></div>

      <!-- Users List -->
      <div class="result-box">
        <h4>Users List</h4>
        <ul class="users-list" id="users-list">
          <li style="text-align: center; color: #999;">Click "Load Users" to fetch data</li>
        </ul>
      </div>
    </div>

    <!-- Raw Response -->
    <div class="result-box" style="margin-top: 20px;">
      <h4>Last Response</h4>
      <div class="result-content" id="raw-response">Ready to send requests...</div>
    </div>
  </div>

  <script>
    // Configuration
    const CACHED_API_URL = localStorage.getItem('apiUrl');
    const DEFAULT_API_URL = 'https://gateway-app.icybush-04297a48.southeastasia.azurecontainerapps.io';
    const LOCAL_API_URL = 'http://localhost:3000';

    const API_BASE_URL = CACHED_API_URL || (window.location.protocol === 'file:' ? DEFAULT_API_URL : LOCAL_API_URL);

    // Expose a custom setter for quick overrides in browser console
    window.setApiUrl = (url) => {
      localStorage.setItem('apiUrl', url);
      location.reload();
    };

    // Helper function to display messages
    function showMessage(message, type = 'success') {
      const messageDiv = document.getElementById('result-message');
      messageDiv.innerHTML = `<div class="${type}">${message}</div>`;
      setTimeout(() => messageDiv.innerHTML = '', 5000);
    }

    // Helper function to display raw response
    function displayRawResponse(data) {
      document.getElementById('raw-response').innerText = JSON.stringify(data, null, 2);
    }

    // Check service health
    async function checkServices() {
      try {
        // Check Gateway
        const gatewayRes = await fetch(`${API_BASE_URL}/health`, { method: 'GET' });
        const gatewayIndicator = document.getElementById('gateway-indicator');
        if (gatewayRes.ok) {
          gatewayIndicator.classList.replace('unknown', 'healthy');
          document.getElementById('gateway-status').innerText = '✓ Healthy';
        } else {
          gatewayIndicator.classList.replace('unknown', 'unhealthy');
          document.getElementById('gateway-status').innerText = '✗ Unhealthy';
        }
      } catch (error) {
        document.querySelector('.status:nth-child(1) .status-indicator').classList.add('unhealthy');
        document.getElementById('gateway-status').innerText = '✗ Unreachable';
      }

      try {
        // Check API through Gateway
        const apiRes = await fetch(`${API_BASE_URL}/health`, { method: 'GET' });
        const apiIndicator = document.getElementById('api-indicator');
        if (apiRes.ok) {
          apiIndicator.classList.replace('unknown', 'healthy');
          document.getElementById('api-status').innerText = '✓ Healthy';
        } else {
          apiIndicator.classList.replace('unknown', 'unhealthy');
          document.getElementById('api-status').innerText = '✗ Unhealthy';
        }
      } catch (error) {
        document.querySelector('.status:nth-child(2) .status-indicator').classList.add('unhealthy');
        document.getElementById('api-status').innerText = '✗ Unreachable';
      }
    }

    // Load users
    async function loadUsers() {
      const spinner = '<div class="spinner"></div>';
      document.getElementById('users-list').innerHTML = `<li style="text-align: center;">${spinner}Loading users...</li>`;

      try {
        const response = await fetch(`${API_BASE_URL}/users`);
        const data = await response.json();
        displayRawResponse(data);

        if (data.data && Array.isArray(data.data)) {
          const usersList = document.getElementById('users-list');
          usersList.innerHTML = '';
          
          if (data.data.length === 0) {
            usersList.innerHTML = '<li style="text-align: center; color: #999;">No users found</li>';
            return;
          }

          data.data.forEach(user => {
            const li = document.createElement('li');
            li.innerHTML = `
              <div class="user-info">
                <div class="user-name">${user.name}</div>
                <div class="user-email">${user.email}</div>
              </div>
              <div class="user-actions">
                <button class="btn-delete" onclick="deleteUser('${user.id}')">Delete</button>
              </div>
            `;
            usersList.appendChild(li);
          });
        }
      } catch (error) {
        showMessage(`Error loading users: ${error.message}`, 'error');
        displayRawResponse({ error: error.message });
      }
    }

    // Create user
    async function createUser() {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();

      if (!name || !email) {
        showMessage('Please fill in all fields', 'error');
        return;
      }

      try {
        const response = await fetch(`${API_BASE_URL}/users`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email })
        });

        const data = await response.json();
        displayRawResponse(data);

        if (response.ok) {
          showMessage(`✓ User "${name}" created successfully`, 'success');
          document.getElementById('name').value = '';
          document.getElementById('email').value = '';
          loadUsers();
        } else {
          showMessage(`✗ Error: ${data.error || 'Failed to create user'}`, 'error');
        }
      } catch (error) {
        showMessage(`Error: ${error.message}`, 'error');
        displayRawResponse({ error: error.message });
      }
    }

    // Delete user
    async function deleteUser(userId) {
      if (!confirm('Are you sure you want to delete this user?')) {
        return;
      }

      try {
        const response = await fetch(`${API_BASE_URL}/users/${userId}`, {
          method: 'DELETE'
        });

        const data = await response.json();
        displayRawResponse(data);

        if (response.ok) {
          showMessage('✓ User deleted successfully', 'success');
          loadUsers();
        } else {
          showMessage(`✗ Error: ${data.error || 'Failed to delete user'}`, 'error');
        }
      } catch (error) {
        showMessage(`Error: ${error.message}`, 'error');
        displayRawResponse({ error: error.message });
      }
    }

    // Auto-check services on page load
    window.addEventListener('DOMContentLoaded', () => {
      checkServices();
    });
  </script>
</body>
</html>
